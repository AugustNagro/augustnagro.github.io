---
layout: default
---
<div class="container">
  <h4 align="center">Blog</h4>
  <div class="md-six md-offset-by-three columns">
    {% for post in site.posts %}
    <a href="{{ post.url }}" class="card">
      <h6>{{ post.title }}</h6>
      <p>{{ post.date | date: "%b %-d, %Y"}}</p>
      <p>{{ post.excerpt | limit: 250}}</p>
    </a>
    {% endfor %}
  </div>
</div>
